name: Feature request
description: Propose a small, testable feature for Project Vela
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: implementer
    attributes:
      label: Implementation lane
      description: Choose who should implement this. After creating the issue, apply the matching label (`impl:cursor` or `impl:jules`).
      options:
        - Cursor (local iteration)
        - Jules (async PR)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / user story
      description: What problem are we solving? Who is the operator/user?
      placeholder: As an operator, I want...
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed behavior
      description: Describe the intended behavior, including defaults and settings toggles.
      placeholder: Default behavior is..., optional toggle is...
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance checks (must be testable)
      description: Bullet list of checks that confirm the feature works.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: risk
    attributes:
      label: Risk areas
      description: What could crash or cause show-stopping behavior? (Playback, Panic, Multi-monitor, Folder watch)
      placeholder: Playback engine / panic blackout / file watcher...

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: Explicitly list what this issue will NOT do.
      placeholder: Not doing...

  - type: textarea
    id: test_plan
    attributes:
      label: Test plan
      description: Add steps to docs/SMOKE_TEST.md or list manual test steps.
      placeholder: |
        - Step 1...
        - Step 2...
