name: Implementation lane guard

on:
  issues:
    types: [opened, edited, labeled, unlabeled]

permissions:
  issues: write

jobs:
  lane-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Check for conflicting lane labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.issue.labels || []).map(l => l.name);
            const hasCursor = labels.includes('impl:cursor');
            const hasJules = labels.includes('impl:jules');

            if (hasCursor && hasJules) {
              const msg = [
                '⚠️ **Lane conflict:** this Issue has both `impl:cursor` and `impl:jules` labels.',
                '',
                '**Project Vela rule:** One Issue → one implementer → one PR.',
                '',
                'Please remove one label:',
                '- Keep `impl:cursor` if you plan to implement locally in Cursor.',
                '- Keep `impl:jules` if you want Jules to implement and open a PR.',
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: msg,
              });
            }
