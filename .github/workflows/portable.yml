name: Portable Release (ZIP)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish
        shell: pwsh
        run: .\scripts\publish-win.ps1 -Configuration Portable

      - name: Prepare and Zip
        shell: pwsh
        run: |
          # Get version from Directory.Build.props
          $version = (Select-Xml -Path "Directory.Build.props" -XPath "//Version").Node.InnerText
          Write-Host "Detected version: $version"

          # Rename publish directory to ProjectVela so the zip extracts to a folder
          Rename-Item -Path "publish" -NewName "ProjectVela"

          # Create marker file for portable mode
          New-Item -Path "ProjectVela\.portable" -ItemType File

          $zipPath = "ProjectVela-Portable-v$version.zip"
          Compress-Archive -Path "ProjectVela" -DestinationPath $zipPath
          Write-Host "Created $zipPath"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectVela-Portable
          path: ProjectVela-Portable-v*.zip
